# =============================================================================
# IND Appointments Tracker - Docker Compose
# =============================================================================
#
# Quick start:
#   cp .env.example .env        # Edit with your values
#   docker compose up -d        # Start the app
#   docker compose logs -f      # Watch logs
#
# With Nginx reverse proxy + SSL:
#   docker compose --profile proxy up -d
#
# With Chromium for booking automation:
#   INSTALL_BROWSERS=true docker compose up -d --build
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Main application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_BROWSERS: ${INSTALL_BROWSERS:-false}
    container_name: ind-appointments
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    volumes:
      # Persist SQLite database across restarts
      - app-data:/app/data
      # Persist logs
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ind-network

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy (activate with: --profile proxy)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1-alpine
    container_name: ind-nginx
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ind-network

  # ---------------------------------------------------------------------------
  # Scheduled database backup (activate with: --profile backup)
  # ---------------------------------------------------------------------------
  backup:
    image: alpine:3
    container_name: ind-backup
    profiles: ["backup"]
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache sqlite
        echo "Backup service started. Running daily at 02:00 UTC."
        while true; do
          TARGET=$$(date +%Y-%m-%d_%H%M%S)
          echo "[$$TARGET] Backing up database..."
          mkdir -p /backups
          cp /data/ind_appointments.db "/backups/ind_appointments_$$TARGET.db" 2>/dev/null && \
            echo "Backup saved to /backups/ind_appointments_$$TARGET.db" || \
            echo "No database found to back up"
          # Keep last 14 backups
          ls -t /backups/ind_appointments_*.db 2>/dev/null | tail -n +15 | xargs rm -f 2>/dev/null
          sleep 86400
        done
    volumes:
      - app-data:/data:ro
      - app-backups:/backups
    networks:
      - ind-network

networks:
  ind-network:
    driver: bridge

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
  app-backups:
    driver: local
